                <div class="logo-container">
                    <div class="logo">
                        <div class="logo-inner">
                            <div class="circle"></div>
                            <div class="text">RD</div>
                        </div>
                    </div>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

                    </div>
                </div>
            </div>
        </div>

    <main class="container my-5">
        <section id="contact" class="my-5">
            <h1>Contact Me</h1>
            <p>Feel free to reach out to me using the form below or connect with me on social media.</p>
            <div class="row">
                <div class="col-md-6 mb-4">
                    <h4>Contact Form</h4>
                    <div class="card bg-dark text-white p-4">
                        <form>
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Send Message</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <h4>Connect with Me</h4>
                    <div class="card bg-dark text-white p-4 mb-4">
                        <div class="d-flex flex-column">
                            <a href="#" class="btn btn-secondary btn-sm mb-2"><i class="fab fa-twitter me-2"></i>Twitter</a>
                            <a href="#" class="btn btn-secondary btn-sm mb-2"><i class="fab fa-linkedin me-2"></i>LinkedIn</a>
                            <a href="#" class="btn btn-secondary btn-sm mb-2"><i class="fab fa-github me-2"></i>GitHub</a>
                        </div>
                    </div>
                    <h4>Find Me</h4>
                    <div class="card bg-dark text-white p-4">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12658.56158564525!2d-5.930120252736317!3d54.59728511878837!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4861084502c1f1f7%3A0x1244b37b71a0a4e8!2sBelfast%2C%20Northern%20Ireland!5e0!3m2!1sen!2suk!4v1690359140741!5m2!1sen!2suk" width="100%" height="300" frameborder="0" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>
